# ADS-B collector — execd (persistent). Telegraf signals it each interval via STDIN.
[[inputs.execd]]
  command = ["python3", "/usr/share/adsb-graphs/adsb_telegraf.py"]
  environment = ["ADSB_COLLECTOR_CONF=/usr/share/adsb-graphs/adsb_collector.conf"]
  signal = "STDIN"
  restart_delay = "10s"
  data_format = "influx"

# Fallback if execd misbehaves on a given platform — re-spawn once per interval.
# Comment out the execd block above and uncomment this:
# [[inputs.exec]]
#   commands = ["python3 /usr/share/adsb-graphs/adsb_telegraf.py --once"]
#   environment = ["ADSB_COLLECTOR_CONF=/usr/share/adsb-graphs/adsb_collector.conf"]
#   timeout = "15s"
#   data_format = "influx"
