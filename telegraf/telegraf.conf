# adsb-graphs Telegraf agent (migration slice).
# Drop-in configs live in telegraf.d/ (loaded via the system unit's --config-directory,
# or symlink this dir to /etc/telegraf/telegraf.d/).

[agent]
  interval = "60s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "60s"
  flush_jitter = "5s"
  omit_hostname = false

# Single InfluxDB v1.x output. Database created by influxdb/retention.iql.
[[outputs.influxdb]]
  urls = ["http://127.0.0.1:8086"]
  database = "adsb-graphs"
  skip_database_creation = true
  # username = "telegraf"
  # password = "..."
