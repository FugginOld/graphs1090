# Grafana dashboard provider — loads JSON dashboards from disk.
# Install to /etc/grafana/provisioning/dashboards/provider.yaml
apiVersion: 1

providers:
  - name: adsb-graphs
    orgId: 1
    folder: adsb-graphs
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards/adsb-graphs
      foldersFromFilesStructure: false
