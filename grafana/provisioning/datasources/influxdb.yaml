# Grafana datasource provisioning — InfluxDB v1.x (InfluxQL).
# Install to /etc/grafana/provisioning/datasources/influxdb.yaml
apiVersion: 1

datasources:
  - name: adsb-graphs
    type: influxdb
    access: proxy
    url: http://127.0.0.1:8086
    database: adsb-graphs
    isDefault: true
    jsonData:
      dbName: adsb-graphs
      httpMode: GET
