location /adsb-graphs/graphs/ {
  add_header Cache-Control "public, max-age=0";
  gzip on;
  log_not_found off;
  alias /run/adsb-graphs/;
}

location /adsb-graphs {
  alias /usr/share/adsb-graphs/html/;
  absolute_redirect off;
  try_files $uri $uri/ =404;

  add_header Cache-Control "public, max-age=0";
  gzip on;
}
location /perf {
  absolute_redirect off;
  rewrite ^/perf$ /adsb-graphs/ permanent;
}

# Grafana reverse proxy (Phase C cutover).
# Requires Grafana root_url / serve_from_sub_path — see cutover.sh.
location /grafana/ {
  proxy_pass         http://127.0.0.1:3000/grafana/;
  proxy_http_version 1.1;
  proxy_set_header   Upgrade $http_upgrade;
  proxy_set_header   Connection "upgrade";
  proxy_set_header   Host $host;
}

location = /grafana {
  absolute_redirect off;
  return 301 /grafana/;
}
