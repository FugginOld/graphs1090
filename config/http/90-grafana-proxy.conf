# Reverse-proxy Grafana at /grafana/ through the existing lighttpd instance.
# Requires lighttpd 1.4.46+ (mod_proxy with WebSocket upgrade support).
#
# Before installing this file, Grafana must be configured to serve from
# the /grafana/ sub-path — cutover.sh handles that automatically.
#
# Manual install:
#   sudo install -m 0644 config/http/90-grafana-proxy.conf \
#       /etc/lighttpd/conf-available/90-grafana-proxy.conf
#   sudo lighty-enable-mod grafana-proxy
#   sudo systemctl reload lighttpd

server.modules += ( "mod_proxy" )

$HTTP["url"] =~ "^/grafana" {
    proxy.server  = ( "" => ( ( "host" => "127.0.0.1", "port" => 3000 ) ) )
    proxy.header  = ( "upgrade" => "websocket" )
}

# Redirect the slash-less URL so links don't break.
url.redirect += (
    "^/grafana$" => "/grafana/",
)
